<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="hark — capture and transcribe macOS audio from a single native CLI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#10151C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.38" r="0.55">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- faint background waveform -->
  <g opacity="0.08" fill="url(#accent)">
    <rect x="90"   y="470" width="12" height="52"  rx="6"/>
    <rect x="120"  y="446" width="12" height="100" rx="6"/>
    <rect x="150"  y="482" width="12" height="32"  rx="6"/>
    <rect x="1052" y="118" width="12" height="52"  rx="6"/>
    <rect x="1082" y="94"  width="12" height="100" rx="6"/>
    <rect x="1112" y="130" width="12" height="32"  rx="6"/>
    <rect x="1142" y="106" width="12" height="76"  rx="6"/>
  </g>

  <!-- logo lockup -->
  <g transform="translate(415,150)">
    <g fill="url(#accent)">
      <rect x="0"   y="44" width="18" height="30"  rx="9"/>
      <rect x="32"  y="22" width="18" height="74"  rx="9"/>
      <rect x="64"  y="-12" width="18" height="142" rx="9"/>
      <rect x="96"  y="16" width="18" height="86"  rx="9"/>
      <rect x="128" y="42" width="18" height="34"  rx="9"/>
    </g>
    <text x="178" y="102"
          font-family="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,Menlo,Consolas,monospace"
          font-size="128" font-weight="700" letter-spacing="-5"
          fill="#E6EDF3">hark</text>
  </g>

  <!-- tagline -->
  <text x="640" y="350" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="36" font-weight="500" fill="#C9D1D9">Capture &amp; transcribe macOS audio from a single native CLI</text>

  <!-- feature chips -->
  <g font-family="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,Menlo,Consolas,monospace"
     font-size="22" fill="#9DA7B3" text-anchor="middle">
    <text x="640" y="420">microphone &#183; system &#183; per-app  &#8594;  text</text>
    <text x="640" y="458" fill="#3B82F6">whisper &#183; apple &#183; whisperkit &#183; parakeet</text>
  </g>

  <!-- footer -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
     font-size="24" fill="#6E7781" text-anchor="middle">
    <text x="640" y="560">github.com/PhantomYdn/hark &#8226; macOS 14.4+ &#8226; MIT</text>
  </g>
</svg>
