name: Release

on:
  push:
    tags:
      - "v*"

# Needed to create the GitHub Release and push the formula bump back to main.
permissions:
  contents: write

jobs:
  release:
    name: Build, package & publish (macOS arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tarball=hark-$VERSION-macos-arm64.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: swift build -c release

      - name: Verify binary
        run: |
          BIN=.build/release/hark
          test -x "$BIN"
          "$BIN" --version
          "$BIN" --version | grep -qx "${{ steps.version.outputs.version }}"

      - name: Sign & notarize binary
        env:
          DEVID_CERT_P12_BASE64: ${{ secrets.DEVID_CERT_P12_BASE64 }}
          DEVID_CERT_PASSWORD:   ${{ secrets.DEVID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD:     ${{ secrets.KEYCHAIN_PASSWORD }}
          NOTARY_KEY_P8_BASE64:  ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID:         ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID:      ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          BIN=.build/release/hark

          # Decode the Developer ID cert and the notary API key from secrets.
          echo "$DEVID_CERT_P12_BASE64" | base64 --decode > cert.p12
          echo "$NOTARY_KEY_P8_BASE64"  | base64 --decode > notary.p8

          # Import the cert into a throwaway keychain that codesign can use
          # non-interactively.
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$DEVID_CERT_PASSWORD" -T /usr/bin/codesign
          # Import the Apple "Developer ID Certification Authority" intermediate so
          # the leaf chains to a trusted anchor (otherwise the identity is invalid).
          curl -fsSL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o devid_intermediate.cer
          security import devid_intermediate.cer -k "$KEYCHAIN" 2>/dev/null || true
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk '/Developer ID Application/ {print $2; exit}')"
          test -n "$IDENTITY"

          # Sign with the hardened runtime, entitlements, and a secure timestamp.
          codesign --force --options runtime --timestamp \
            --entitlements hark.entitlements -i dev.hark.cli -s "$IDENTITY" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"
          codesign -dvvv "$BIN" 2>&1 | grep -E 'Authority|TeamIdentifier'

          # Notarize. A flat Mach-O can't be stapled, so the ticket lives online
          # (fine for Homebrew + the online Gatekeeper check). Print the log and
          # fail the release if Apple rejects the submission.
          ditto -c -k "$BIN" hark-notarize.zip
          SUBMIT_ID="$(xcrun notarytool submit hark-notarize.zip \
            --key notary.p8 --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" \
            --wait --timeout 30m --output-format json | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')"
          STATUS="$(xcrun notarytool info "$SUBMIT_ID" \
            --key notary.p8 --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" \
            --output-format json | python3 -c 'import sys,json; print(json.load(sys.stdin)["status"])')"
          echo "notarization status: $STATUS"
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::notarization $STATUS — full log:"
            xcrun notarytool log "$SUBMIT_ID" \
              --key notary.p8 --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" || true
            exit 1
          fi
          rm -f cert.p12 notary.p8 hark-notarize.zip devid_intermediate.cer

      - name: Clean up signing keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true

      - name: Package tarball
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL="${{ steps.version.outputs.tarball }}"
          STAGE="dist/hark-$VERSION"
          mkdir -p "$STAGE"
          cp .build/release/hark "$STAGE/"
          cp man/hark.1 "$STAGE/"
          cp LICENSE NOTICES README.md CHANGELOG.md "$STAGE/"
          tar -czf "$TARBALL" -C dist "hark-$VERSION"
          SHA="$(shasum -a 256 "$TARBALL" | awk '{print $1}')"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Packaged $TARBALL ($SHA)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL="${{ steps.version.outputs.tarball }}"
          {
            echo "Apple Silicon (arm64) build. Install with Homebrew:"
            echo
            echo '```sh'
            echo "brew tap PhantomYdn/hark https://github.com/PhantomYdn/hark"
            echo "brew install hark"
            echo '```'
            echo
            echo "The binary is signed (Developer ID) and notarized. Requires macOS"
            echo "14.4+ and, for the default \`whisper\` engine, \`brew install whisper-cpp\`."
            echo
            echo "See [CHANGELOG.md](https://github.com/PhantomYdn/hark/blob/main/CHANGELOG.md) for details."
          } > release-notes.md
          # Make re-tagging idempotent: drop any existing release for this tag
          # (e.g. a renamed/re-cut release) but keep the triggering tag itself.
          gh release delete "$GITHUB_REF_NAME" --yes 2>/dev/null || true
          gh release create "$GITHUB_REF_NAME" "$TARBALL" \
            --title "Hark $VERSION" \
            --notes-file release-notes.md

      - name: Bump Homebrew formula on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.package.outputs.sha256 }}"
          URL="https://github.com/PhantomYdn/hark/releases/download/v$VERSION/hark-$VERSION-macos-arm64.tar.gz"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          sed -i '' -E "s#^  url \".*\"#  url \"$URL\"#" Formula/hark.rb
          sed -i '' -E "s#^  version \".*\"#  version \"$VERSION\"#" Formula/hark.rb
          sed -i '' -E "s#^  sha256 \".*\"#  sha256 \"$SHA\"#" Formula/hark.rb
          if git diff --quiet Formula/hark.rb; then
            echo "Formula already up to date."
          else
            git add Formula/hark.rb
            git commit -m "release: hark $VERSION formula [skip ci]"
            git push origin main
          fi
