name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        hark deliberately keeps a small, Unix-y surface — `hark` is the verb, and
        capture/transcribe/transcode are flags. Please describe the **problem**
        you're trying to solve, not just a proposed flag, so we can find the
        simplest design.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: I want to … but today I have to …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A flag, behavior, or workflow you have in mind (optional).
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or workarounds you've tried.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This fits hark's "do one thing well" scope (capture & transcribe macOS audio).
          required: false
